<title>✦ Shiny Hunting Card Maker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<style>
:root{--bg-deep:#08081a;--bg-surface:#0e0e24;--bg-card:#12122e;--gold-dark:#A08520;--gold:#C9A928;--gold-light:#F0E68C;--gold-glow:rgba(201,169,40,0.15);--text:#d8d8e8;--text-dim:#888;--text-muted:#555;--danger:#ff4466;--success:#44cc88}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-deep);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(201,169,40,0.25)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
#root{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
.header{text-align:center;margin-bottom:32px}
.header h1{font-family:'Chakra Petch',sans-serif;font-size:32px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--text-dim);font-size:14px;margin-top:6px;font-weight:300}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg-surface);border-radius:12px;padding:4px;border:1px solid #1a1a3a}
.tab{flex:1;padding:10px 8px;border:none;border-radius:8px;background:transparent;color:var(--text-dim);font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:all .2s}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.active{background:var(--bg-card);color:var(--gold-light);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.panel{background:var(--bg-surface);border-radius:14px;padding:20px;border:1px solid #1a1a3a;margin-bottom:24px}
.panel-title{font-family:'Chakra Petch',sans-serif;font-size:14px;color:var(--gold);letter-spacing:1px;margin-bottom:14px;text-transform:uppercase;font-weight:600}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.grow{flex:1;min-width:160px}
.form-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;font-weight:500}
input,select{padding:10px 14px;background:var(--bg-deep);border:1px solid #2a2a4a;border-radius:8px;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow)}
input::placeholder{color:#444}select{cursor:pointer}option{background:var(--bg-deep)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--bg-deep)}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.2);color:var(--danger)}
.btn-danger:hover{background:rgba(255,68,102,0.2)}
.btn-outline{background:transparent;border:1px solid #2a2a4a;color:var(--text-dim)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-light)}
.btn-export{padding:14px 36px;font-size:16px;font-family:'Chakra Petch',sans-serif;letter-spacing:1px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold));background-size:200% 100%;color:var(--bg-deep);animation:shimmer 3s linear infinite}
.btn-export:hover{transform:translateY(-2px);box-shadow:0 4px 20px var(--gold-glow)}
.btn-export:disabled{animation:none}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-frame{background:linear-gradient(160deg,#0d0d1a,#141430,#0d0d1a);border-radius:16px;padding:28px;position:relative;overflow:hidden}
.card-frame::before{content:'';position:absolute;inset:0;border-radius:16px;padding:3px;background:linear-gradient(135deg,var(--gold),rgba(240,230,140,0.3),var(--gold),rgba(240,230,140,0.15),var(--gold));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.card-frame::after{content:'';position:absolute;inset:8px;border-radius:10px;border:1px solid rgba(201,169,40,0.12);pointer-events:none}
.card-title{font-family:'Chakra Petch',sans-serif;text-align:center;font-size:22px;font-weight:700;color:var(--gold-light);letter-spacing:1px;margin-bottom:6px;position:relative;z-index:1}
.card-subtitle{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:4px;position:relative;z-index:1}
.card-divider{height:1px;margin:8px 48px 18px;background:linear-gradient(90deg,transparent,rgba(240,230,140,0.5),rgba(240,230,140,0.8),rgba(240,230,140,0.5),transparent);position:relative;z-index:1}
.card-grid{display:grid;gap:10px;justify-content:center;position:relative;z-index:1}
.card-cell{width:120px;position:relative;background:rgba(255,255,255,0.03);border-radius:8px;padding:4px 4px 8px;text-align:center;transition:transform .15s;cursor:pointer}
.card-cell:hover{transform:scale(1.04)}
.card-cell.not-found img{filter:grayscale(1) brightness(0.4)}
.card-cell.not-found .poke-name,.card-cell.not-found .poke-game{color:#444}
.card-cell.selected{outline:2px solid var(--gold);outline-offset:2px}
.card-cell .found-star{position:absolute;top:3px;right:3px;width:20px;height:20px;background:none;border:none;font-size:14px;cursor:pointer;z-index:3;opacity:0;transition:opacity .15s;line-height:1;display:flex;align-items:center;justify-content:center}
.card-cell:hover .found-star{opacity:1}
.card-cell.not-found .found-star{opacity:.7}
.card-cell img{width:68px;height:68px;image-rendering:auto;display:block;margin:4px auto 0;filter:drop-shadow(0 2px 5px rgba(240,230,140,0.12));transition:filter .2s}
.card-cell img.pixelated{image-rendering:pixelated}
.poke-name{font-size:11px;color:#bbb;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poke-game{font-size:9px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poke-count{font-size:12px;font-weight:700;color:var(--gold-light)}
.stats-bar{display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:16px;position:relative;z-index:1}
.stat{font-size:12px;color:var(--text-dim)}.stat b{color:var(--gold-light);font-weight:600}
.edit-panel{background:var(--bg-surface);border:1px solid #2a2a4a;border-radius:12px;padding:16px;margin-bottom:20px;animation:fadeIn .2s ease}
.empty{text-align:center;padding:48px;color:var(--text-muted);border:1px dashed #2a2a4a;border-radius:16px}
.empty .icon{font-size:40px;opacity:.3;margin-bottom:10px}
.error-msg{background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-top:10px}
.loading-bar-container{margin-top:12px}
.loading-bar-bg{height:6px;background:var(--bg-deep);border-radius:3px;overflow:hidden}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-light));border-radius:3px;transition:width .3s}
.loading-text{font-size:12px;color:var(--text-dim);margin-top:6px}
.io-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
@media(max-width:640px){.form-row{flex-direction:column}.form-group.grow{min-width:100%}.header h1{font-size:24px}.tab{font-size:11px;padding:8px 4px}}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:var(--bg-deep);border:1px solid #2a2a4a;border-top:none;border-radius:0 0 8px 8px;z-index:50;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.ac-item:hover,.ac-item.active{background:rgba(201,169,40,0.12)}
.ac-item .ac-fr{color:var(--text)}
.ac-item .ac-id{color:var(--text-muted);font-size:11px;font-family:monospace}
.ac-item .ac-en{color:#666;font-size:11px;margin-left:8px}
</style>
</head>

const frC={},enC={};
async function getNames(pid){
  if(frC[pid]&&enC[pid])return{fr:frC[pid],en:enC[pid]};
  try{
    if(!enC[pid]){const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${pid}`);enC[pid]=(await r.json()).name}
    if(!frC[pid]){const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${pid}`);const d=await r.json();frC[pid]=d.names?.find(n=>n.language.name==="fr")?.name||enC[pid]}
  }catch{frC[pid]=frC[pid]||`#${pid}`;enC[pid]=enC[pid]||`${pid}`}
  return{fr:frC[pid],en:enC[pid]};
}
const SD_NAMES={"nidoran-f":"nidoranf","nidoran-m":"nidoranm","mr-mime":"mrmime","mime-jr":"mimejr","type-null":"typenull","ho-oh":"hooh","porygon-z":"porygonz","jangmo-o":"jangmoo","hakamo-o":"hakamoo","kommo-o":"kommoo","tapu-koko":"tapukoko","tapu-lele":"tapulele","tapu-bulu":"tapubulu","tapu-fini":"tapufini","chi-yu":"chiyu","chien-pao":"chienpao","ting-lu":"tinglu","wo-chien":"wochien","mr-rime":"mrrime","sirfetchd":"sirfetchd","great-tusk":"greattusk","scream-tail":"screamtail","brute-bonnet":"brutebonnet","flutter-mane":"fluttermane","slither-wing":"slitherwing","sandy-shocks":"sandyshocks","iron-treads":"irontreads","iron-bundle":"ironbundle","iron-hands":"ironhands","iron-jugulis":"ironjugulis","iron-moth":"ironmoth","iron-thorns":"ironthorns","roaring-moon":"roaringmoon","iron-valiant":"ironvaliant","walking-wake":"walkingwake","iron-leaves":"ironleaves","gouging-fire":"gougingfire","raging-bolt":"ragingbolt","iron-boulder":"ironboulder","iron-crown":"ironcrown"};
function sdn(apiName,speciesName){
  const full=(apiName||'').toLowerCase().replace(/[^a-z0-9\-]/g,'');
  const sp=(speciesName||apiName||'').toLowerCase().replace(/[^a-z0-9\-]/g,'');
  const base=SD_NAMES[sp]||sp.replace(/-/g,'');
  if(full===sp)return base;
  const suffix=full.slice(sp.length);
  return base+suffix;
}

const formsCache={};
const FORM_LABELS={"exclamation":"!","question":"?","alola":"Alola","galar":"Galar","hisui":"Hisui","paldea":"Paldea","mega":"Méga","mega-x":"Méga X","mega-y":"Méga Y","gmax":"Gigamax","origin":"Origine","sky":"Ciel","land":"Terrestre","primal":"Primo","attack":"Attaque","defense":"Défense","speed":"Vitesse","plant":"Plante","sandy":"Sable","trash":"Déchet","heat":"Chaleur","wash":"Lavage","frost":"Froid","fan":"Hélice","mow":"Tonte","black":"Noir","white":"Blanc","therian":"Totémique","incarnate":"Avatar","ash":"Sacha","10":"10%","50":"50%","complete":"Parfait","dusk":"Crépusculaire","midnight":"Nocturne","midday":"Diurne","low-key":"Grave","amped":"Aigüe","ice":"Glace","noice":"Dégel","gulping":"Gobe","gorging":"Glouton","hangry":"Affamé","crowned":"Couronné","eternamax":"Infinimax","rapid-strike":"Mille Poings","single-strike":"Poing Final","bloodmoon":"Lune Vermeille"};
async function fetchForms(speciesId){
  if(formsCache[speciesId])return formsCache[speciesId];
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesId}`);
    const d=await r.json();
    const vars=d.varieties||[];
    const specName=d.name;

    // 1. Varieties (Alola, Galar, Mega, etc.)
    const forms=vars.map(v=>{
      const name=v.pokemon.name;
      const pid=parseInt(v.pokemon.url.split('/').filter(Boolean).pop());
      const suffix=name===specName?'':name.slice(specName.length+1);
      let label=v.is_default?'Normal':(FORM_LABELS[suffix]||suffix.split('-').map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(' '));
      return{apiName:name,pokemonId:pid,label,isDefault:v.is_default,speciesName:specName};
    });

    // 2. If only 1 variety, check pokemon endpoint for multi-forms (Zarbi, Vivillon, etc.)
    if(vars.length===1){
      const defaultPid=forms[0].pokemonId;
      const r2=await fetch(`https://pokeapi.co/api/v2/pokemon/${defaultPid}`);
      const d2=await r2.json();
      const pForms=d2.forms||[];
      if(pForms.length>1){
        // Replace with form entries
        const formEntries=pForms.map((f,i)=>{
          const fname=f.name;
          const suffix=fname===specName?'':fname.slice(specName.length+1);
          let label=i===0?'Normal':(FORM_LABELS[suffix]||suffix.toUpperCase()||'Normal');
          return{apiName:fname,pokemonId:defaultPid,label,isDefault:i===0,speciesName:specName};
        });
        formsCache[speciesId]=formEntries;
        return formEntries;
      }
    }

    formsCache[speciesId]=forms;
    return forms;
  }catch{return[]}
}
function sUrl(gid,pid,en,sp){const g=GAMES.find(x=>x.id===gid);if(!g)return`${PA}/shiny/${pid}.png`;try{const u=g.url(pid,sdn(en,sp));return u||g.fb(pid)}catch{return g.fb(pid)}}
function fbUrl(gid,pid){const g=GAMES.find(x=>x.id===gid);return g?g.fb(pid):`${PA}/shiny/${pid}.png`}
function altUrl(gid,pid,en,sp){const g=GAMES.find(x=>x.id===gid);if(!g?.alt)return null;try{return g.alt(pid,sdn(en,sp))}catch{return null}}

const CW=120,CH=148,MC=8,CP=28,TH=56,GAP=10;
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}
function lI(s){return new Promise(r=>{const i=new Image();i.crossOrigin="anonymous";i.onload=()=>r(i);i.onerror=()=>r(null);i.src=s})}

async function exportPNG(hunts,title,sub){
  const cols=Math.min(hunts.length,MC),rows=Math.ceil(hunts.length/cols);
  const w=CP*2+cols*CW+(cols-1)*GAP,sH=sub?18:0;
  const h=CP*2+TH+sH+rows*CH+(rows-1)*GAP+12;
  const cv=document.getElementById("export-canvas");cv.width=w*2;cv.height=h*2;
  const c=cv.getContext("2d");c.scale(2,2);

  const bg=c.createLinearGradient(0,0,w,h);bg.addColorStop(0,"#0d0d1a");bg.addColorStop(.5,"#141430");bg.addColorStop(1,"#0d0d1a");
  c.fillStyle=bg;rr(c,0,0,w,h,16);c.fill();
  const bd=c.createLinearGradient(0,0,w,0);bd.addColorStop(0,"#C9A928");bd.addColorStop(.5,"#F0E68C");bd.addColorStop(1,"#C9A928");
  c.strokeStyle=bd;c.lineWidth=3;rr(c,2,2,w-4,h-4,14);c.stroke();
  c.strokeStyle="rgba(201,169,40,0.15)";c.lineWidth=1;rr(c,8,8,w-16,h-16,10);c.stroke();

  c.fillStyle="#F0E68C";c.font="bold 20px 'Chakra Petch',sans-serif";c.textAlign="center";c.fillText(title,w/2,CP+24);
  let oY=0;
  if(sub){c.fillStyle="#888";c.font="11px 'Outfit',sans-serif";c.fillText(sub,w/2,CP+40);oY=18}
  const ln=c.createLinearGradient(CP,0,w-CP,0);ln.addColorStop(0,"transparent");ln.addColorStop(.3,"rgba(240,230,140,0.4)");ln.addColorStop(.5,"rgba(240,230,140,0.7)");ln.addColorStop(.7,"rgba(240,230,140,0.4)");ln.addColorStop(1,"transparent");
  c.strokeStyle=ln;c.lineWidth=1;c.beginPath();c.moveTo(CP+16,CP+32+oY);c.lineTo(w-CP-16,CP+32+oY);c.stroke();

  const sprs=await Promise.all(hunts.map(async h=>{let img=await lI(h.spriteUrl);if(!img)img=await lI(h.fallbackUrl);if(!img)img=await lI(`${PA}/shiny/${h.pokemonId}.png`);return img}));
  const gridY=CP+TH+sH;

  for(let i=0;i<hunts.length;i++){
    const hu=hunts[i],gm=GAMES.find(x=>x.id===hu.gameId);
    const cl=i%cols,ro=Math.floor(i/cols);
    const x=CP+cl*(CW+GAP),y=gridY+ro*(CH+GAP);

    c.fillStyle=hu.found?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.15)";rr(c,x,y,CW,CH,6);c.fill();
    c.strokeStyle=(gm?.color||"#555")+(hu.found?"33":"15");c.lineWidth=1;rr(c,x,y,CW,CH,6);c.stroke();

    if(sprs[i]){
      if(!hu.found)c.filter="grayscale(1) brightness(0.4)";
      c.imageSmoothingEnabled=!gm?.px;c.drawImage(sprs[i],x+(CW-64)/2,y+6,64,64);c.imageSmoothingEnabled=true;
      c.filter="none";
    }
    c.textAlign="center";
    c.fillStyle=hu.found?"#ccc":"#444";c.font="11px 'Outfit',sans-serif";
    const dn=hu.name.length>14?hu.name.slice(0,12)+"…":hu.name;
    c.fillText(dn,x+CW/2,y+82);

    // Game label
    const rawLabel=hu.displayLabel!=null?hu.displayLabel:(gm?.short||"");
    if(rawLabel){
      c.fillStyle=hu.found?"#666":"#333";c.font="9px 'Outfit',sans-serif";
      const gl=rawLabel.length>14?rawLabel.slice(0,12)+"…":rawLabel;
      c.fillText(gl,x+CW/2,y+94);
    }

    if(hu.count){c.fillStyle=hu.found?"#F0E68C":"#555";c.font="bold 12px 'Outfit',sans-serif";c.fillText(hu.count,x+CW/2,y+110)}
  }

  cv.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="shiny-hunting-card.png";a.click();URL.revokeObjectURL(a.href)});
}

/* ─── Autocomplete search component (outside App to avoid re-mount) ─── */
function PkmnSearch({value,onChange,onSelect,onSubmit}){
  const [open,setOpen]=useState(false);
  const [idx,setIdx]=useState(0);
  const ref=useRef(null);
  const q=value.toLowerCase().trim();
  const results=useMemo(()=>{
    if(!q||q.length<1)return[];
    const num=parseInt(q);
    if(!isNaN(num)&&num>=1&&num<=PKMN_DB.length)return[PKMN_DB[num-1]];
    const exact=[];const starts=[];const contains=[];
    for(const p of PKMN_DB){
      const fl=p[1].toLowerCase(),el=p[2].toLowerCase();
      if(fl===q||el===q){exact.push(p)}
      else if(fl.startsWith(q)||el.startsWith(q)){starts.push(p)}
      else if(fl.includes(q)||el.includes(q)){contains.push(p)}
    }
    return[...exact,...starts,...contains].slice(0,12);
  },[q]);
  useEffect(()=>{setIdx(0)},[q]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const pick=p=>{onSelect(p);setOpen(false)};
  const kd=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(i+1,results.length-1))}
    else if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(i-1,0))}
    else if(e.key==="Enter"){e.preventDefault();if(results.length>0&&open)pick(results[idx]);else onSubmit()}
    else if(e.key==="Escape")setOpen(false);
  };
  return(
    <div className="ac-wrap" ref={ref}>
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true)}}
        onFocus={()=>value.trim()&&setOpen(true)} onKeyDown={kd}
        placeholder="Nom FR, EN ou n°…" />
      {results.length>0&&(
        <div className={`ac-list${open?" open":""}`}>
          {results.map((p,i)=>(
            <div key={p[0]} className={`ac-item${i===idx?" active":""}`} onClick={()=>pick(p)}
              onMouseEnter={()=>setIdx(i)}>
              <span><span className="ac-fr">{p[1]}</span><span className="ac-en">{p[2]}</span></span>
              <span className="ac-id">#{String(p[0]).padStart(4,"0")}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  useEffect(()=>{const d=REGIONAL_DEXES.find(x=>x.id===dexId);if(d)setDexG(d.dg)},[dexId]);

  function handleSpriteErr(e,h){
    const img=e.target;const a=altUrl(h.gameId,h.pokemonId,h.enName,h.speciesEn);const f=h.fallbackUrl;const u=`${PA}/shiny/${h.pokemonId}.png`;
    if(a&&img.src!==a&&img.src!==f&&img.src!==u)img.src=a;
    else if(f&&img.src!==f&&img.src!==u)img.src=f;
    else if(img.src!==u)img.src=u;
  }

  /* ─── Export/Import JSON ─── */
  function exportJSON(){
    const data={version:2,title,sub,hunts:hunts.map(h=>({pokemonId:h.pokemonId,name:h.name,enName:h.enName,speciesEn:h.speciesEn||h.enName,speciesId:h.speciesId||h.pokemonId,gameId:h.gameId,count:h.count,found:h.found,displayLabel:h.displayLabel!=null?h.displayLabel:undefined}))};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="shiny-card.json";a.click();URL.revokeObjectURL(a.href);
  }
  function importJSON(){document.getElementById("import-file").click()}
  useEffect(()=>{
    const el=document.getElementById("import-file");
    const handler=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(data.title)setTitle(data.title);
          if(data.sub)setSub(data.sub);
          if(data.hunts){
            setHunts(data.hunts.map((h,i)=>({
              ...h,speciesEn:h.speciesEn||h.enName,speciesId:h.speciesId||h.pokemonId,id:Date.now()+i+Math.random()*9999,
              spriteUrl:sUrl(h.gameId,h.pokemonId,h.enName,h.speciesEn||h.enName),
              fallbackUrl:fbUrl(h.gameId,h.pokemonId),
              found:h.found??false
            })));
          }
          setEditId(null);
        }catch{alert("Fichier JSON invalide")}
      };
      reader.readAsText(file);
      e.target.value="";
    };
    el.addEventListener("change",handler);
    return()=>el.removeEventListener("change",handler);
  },[]);

  /* ─── Game select grouped ─── */
  const groups=[
    {l:"── Gen I ──",g:GAMES.filter(x=>x.gen===1)},{l:"── Gen II ──",g:GAMES.filter(x=>x.gen===2)},
    {l:"── Gen III ──",g:GAMES.filter(x=>x.gen===3)},{l:"── Gen IV ──",g:GAMES.filter(x=>x.gen===4)},
    {l:"── Gen V ──",g:GAMES.filter(x=>x.gen===5)},{l:"── Gen VI ──",g:GAMES.filter(x=>x.gen===6)},
    {l:"── Gen VII ──",g:GAMES.filter(x=>x.gen===7)},{l:"── Gen VIII ──",g:GAMES.filter(x=>x.gen===8)},
    {l:"── Gen IX ──",g:GAMES.filter(x=>x.gen===9)},{l:"── Spéciaux ──",g:GAMES.filter(x=>x.gen===0)},
  ];
  function GS({value,onChange}){return(
    <select value={value} onChange={onChange}>
      {groups.map((gr,i)=><React.Fragment key={i}>
        <option disabled style={{color:"#C9A928",fontWeight:700}}>{gr.l}</option>
        {gr.g.map(g=><option key={g.id} value={g.id}>{g.label}</option>)}
      </React.Fragment>)}
    </select>
  )}

  const handleSelect=useCallback(p=>{
    const [id,fr,en]=p;
    setPk(fr);setSelSpecies({id,fr,en});setSelForm(null);setForms([]);
    setFormsLoading(true);
    fetchForms(id).then(f=>{
      setForms(f);
      const def=f.find(x=>x.isDefault)||f[0];
      setSelForm(def||null);
      setFormsLoading(false);
      // Auto-add if only 1 form (no choice needed)
      if(f.length<=1){
        const pid=def?def.pokemonId:id;
        const eName=def?def.apiName:en;
        const sEn=def?def.speciesName:en;
        setHunts(prev=>[...prev,{id:Date.now(),pokemonId:pid,name:fr,enName:eName,speciesEn:sEn,speciesId:id,gameId:gm,count:cnt.trim()||null,spriteUrl:sUrl(gm,pid,eName,sEn),fallbackUrl:fbUrl(gm,pid),found:true}]);
        setPk("");setCnt("");setSelSpecies(null);setForms([]);setSelForm(null);
      }
    });
  },[gm,cnt]);

  const cols=Math.min(hunts.length,MC);
  const foundCount=hunts.filter(h=>h.found).length;
  const pct=hunts.length?Math.round(foundCount/hunts.length*100):0;

  return (
    <div>
      <div className="header">
        <h1>✦ SHINY HUNTING CARD</h1>
        <p>Sprites : PokeAPI · Pokémon Showdown · DewiLet/Sprites</p>
      </div>

      <div className="panel">
        <div className="form-row" style={{marginBottom:10}}>
          <div className="form-group grow">
            <span className="form-label">Titre</span>
            <input value={title} onChange={e=>setTitle(e.target.value)} style={{fontFamily:"'Chakra Petch',sans-serif",fontWeight:600,color:"var(--gold-light)"}} />
          </div>
          <div className="form-group grow">
            <span className="form-label">Sous-titre</span>
            <input value={sub} onChange={e=>setSub(e.target.value)} placeholder="ex: 0001 – 0151" />
          </div>
        </div>
        <div className="io-row">
          <button className="btn btn-outline btn-sm" onClick={exportJSON} disabled={!hunts.length}>💾 Sauvegarder (.json)</button>
          <button className="btn btn-outline btn-sm" onClick={importJSON}>📂 Charger (.json)</button>
        </div>
      </div>

      <div className="tabs">
        {[{id:"manual",l:"➕ Manuel"},{id:"gen",l:"🎮 Génération"},{id:"dex",l:"📖 Pokédex Régional"}].map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {tab==="manual"&&(
        <div className="panel">
          <div className="panel-title">Ajouter un Pokémon</div>
          <div className="form-row">
            <div className="form-group grow">
              <span className="form-label">Pokémon <span style={{color:"#555",textTransform:"none"}}>(nom FR, EN ou n°)</span></span>
              <PkmnSearch value={pk} onChange={v=>{setPk(v);setErr("")}} onSelect={handleSelect} onSubmit={()=>!ld&&addOne()} />
            </div>
            <div className="form-group grow">
              <span className="form-label">Jeu</span>
              <GS value={gm} onChange={e=>setGm(e.target.value)} />
            </div>
            {forms.length>1&&(
              <div className="form-group">
                <span className="form-label">Forme</span>
                <select value={selForm?.apiName||''} onChange={e=>{const f=forms.find(x=>x.apiName===e.target.value);setSelForm(f)}}
                  style={{minWidth:120}}>
                  {forms.map(f=><option key={f.apiName} value={f.apiName}>{f.label}</option>)}
                </select>
              </div>
            )}
            {formsLoading&&<div style={{alignSelf:"center",fontSize:12,color:"var(--text-dim)"}}>Chargement formes…</div>}
            <div className="form-group">
              <span className="form-label">Rencontres</span>
              <input value={cnt} onChange={e=>setCnt(e.target.value)} placeholder="—" style={{width:100,textAlign:"center",color:"var(--gold-light)"}} />
            </div>
            <button className="btn btn-gold" onClick={addOne} disabled={ld||!pk.trim()} style={{height:42}}>{ld?"…":"+ Ajouter"}</button>
          </div>
          {err&&<div className="error-msg">{err}</div>}
        </div>
      )}

      {tab==="gen"&&(
        <div className="panel">
          <div className="panel-title">Générer par Génération</div>
          <div className="form-row">
            <div className="form-group grow">
              <span className="form-label">Génération</span>
              <select value={genId} onChange={e=>setGenId(Number(e.target.value))}>
                {GENERATIONS.map(g=><option key={g.id} value={g.id}>{g.label} ({g.rangeLabel})</option>)}
              </select>
            </div>
            <div className="form-group grow">
              <span className="form-label">Jeu (sprites)</span>
              <GS value={genG} onChange={e=>setGenG(e.target.value)} />
            </div>
            <button className="btn btn-gold" onClick={genCard} disabled={genLd} style={{height:42}}>{genLd?"Chargement…":"Générer"}</button>
          </div>
          {genLd&&<div className="loading-bar-container"><div className="loading-bar-bg"><div className="loading-bar-fill" style={{width:`${genPr.t?genPr.c/genPr.t*100:0}%`}}/></div><div className="loading-text">Chargement… {genPr.c}/{genPr.t}</div></div>}
          <div style={{marginTop:10,fontSize:12,color:"var(--text-muted)"}}>⚠ Remplace la carte. Pokémon grisés par défaut. Clique ✦ pour marquer trouvé.</div>
        </div>
      )}

      {tab==="dex"&&(
        <div className="panel">
          <div className="panel-title">Générer par Pokédex Régional</div>
          <div className="form-row">
            <div className="form-group grow">
              <span className="form-label">Pokédex</span>
              <select value={dexId} onChange={e=>setDexId(Number(e.target.value))}>
                {REGIONAL_DEXES.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </div>
            <div className="form-group grow">
              <span className="form-label">Jeu (sprites)</span>
              <GS value={dexG} onChange={e=>setDexG(e.target.value)} />
            </div>
            <button className="btn btn-gold" onClick={dexCard} disabled={dexLd} style={{height:42}}>{dexLd?"Chargement…":"Générer"}</button>
          </div>
          {dexLd&&<div className="loading-bar-container"><div className="loading-bar-bg"><div className="loading-bar-fill" style={{width:`${dexPr.t?dexPr.c/dexPr.t*100:0}%`}}/></div><div className="loading-text">Chargement… {dexPr.c}/{dexPr.t}</div></div>}
          <div style={{marginTop:10,fontSize:12,color:"var(--text-muted)"}}>⚠ Données PokéAPI. Remplace la carte.</div>
        </div>
      )}

      {hunts.length>0&&(
        <div style={{display:"flex",gap:10,marginBottom:16,justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"var(--text-dim)"}}>{hunts.length} Pokémon · <span style={{color:"var(--success)"}}>{foundCount} trouvés</span> · {pct}%</span>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button className="btn btn-outline btn-sm" onClick={()=>setHunts(p=>p.map(h=>({...h,found:true})))}>✦ Tout trouvé</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setHunts(p=>p.map(h=>({...h,found:false})))}>Tout griser</button>
            <button className="btn btn-danger btn-sm" onClick={()=>{setHunts([]);setSub("");setEditId(null)}}>Effacer</button>
          </div>
        </div>
      )}

      {editHunt&&(
        <div className="edit-panel">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div className="panel-title" style={{margin:0}}>Modifier — {editHunt.name} (#{pad4(editHunt.pokemonId)})</div>
            <button className="btn btn-outline btn-sm" onClick={()=>setEditId(null)}>✕ Fermer</button>
          </div>
          <div className="form-row">
            <div className="form-group grow">
              <span className="form-label">Jeu / Sprite</span>
              <GS value={editGame} onChange={e=>setEditGame(e.target.value)} />
            </div>
            {editForms.length>1&&(
              <div className="form-group">
                <span className="form-label">Forme</span>
                <select value={editSelForm?.apiName||''} onChange={e=>{const f=editForms.find(x=>x.apiName===e.target.value);setEditSelForm(f)}}
                  style={{minWidth:120}}>
                  {editForms.map(f=><option key={f.apiName} value={f.apiName}>{f.label}</option>)}
                </select>
              </div>
            )}
            <div className="form-group">
              <span className="form-label">Rencontres</span>
              <input value={editCount} onChange={e=>setEditCount(e.target.value)} placeholder="—" style={{width:100,textAlign:"center",color:"var(--gold-light)"}} />
            </div>
            <div className="form-group">
              <span className="form-label">Version affichée</span>
              <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} placeholder="vide = masqué" style={{width:120}} />
            </div>
            <button className="btn btn-gold btn-sm" style={{height:42}} onClick={()=>{
              const ef=editSelForm;const pid=ef?ef.pokemonId:editHunt.pokemonId;const eName=ef?ef.apiName:editHunt.enName;const sEn=ef?ef.speciesName:editHunt.speciesEn;
              const formLabel=ef&&!ef.isDefault?' ('+ef.label+')':'';
              const baseName=(editHunt.name||'').replace(/\s*\(.*\)$/,'');
              updateHunt(editId,{pokemonId:pid,enName:eName,speciesEn:sEn,name:baseName+formLabel,gameId:editGame,displayLabel:editLabel,spriteUrl:sUrl(editGame,pid,eName,sEn),fallbackUrl:fbUrl(editGame,pid),count:editCount.trim()||null});
            }}>Appliquer</button>
          </div>
          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
            <button className="btn btn-outline btn-sm" onClick={()=>moveHunt(editId,-1)}>◀ Reculer</button>
            <button className="btn btn-outline btn-sm" onClick={()=>moveHunt(editId,1)}>Avancer ▶</button>
            <button className="btn btn-sm" style={{marginLeft:"auto",background:editHunt.found?"rgba(68,204,136,0.15)":"rgba(255,255,255,0.05)",border:`1px solid ${editHunt.found?"rgba(68,204,136,0.3)":"#2a2a4a"}`,color:editHunt.found?"var(--success)":"var(--text-dim)"}}
              onClick={()=>updateHunt(editId,{found:!editHunt.found})}>
              {editHunt.found?"✦ Trouvé":"Non trouvé"}
            </button>
            <button className="btn btn-danger btn-sm" onClick={()=>{setHunts(p=>p.filter(h=>h.id!==editId));setEditId(null)}}>Supprimer</button>
          </div>
        </div>
      )}

      {hunts.length>0?(
        <>
          <div className="card-frame">
            <div className="card-title">{title}</div>
            {sub&&<div className="card-subtitle">{sub}</div>}
            <div className="card-divider" />
            <div className="card-grid" style={{gridTemplateColumns:`repeat(${cols},${CW}px)`}}>
              {hunts.map((h,i)=>{const g=GAMES.find(x=>x.id===h.gameId);return(
                <div key={h.id} className={`card-cell${h.found?'':' not-found'}${editId===h.id?' selected':''}`}
                  style={{animation:`fadeIn .15s ease ${Math.min(i*.015,.8)}s both`}}
                  onClick={()=>setEditId(editId===h.id?null:h.id)}>
                  <button className="found-star" title={h.found?"Marquer non trouvé":"Marquer trouvé"}
                    onClick={e=>{e.stopPropagation();updateHunt(h.id,{found:!h.found})}}>
                    {h.found?"✦":"☆"}
                  </button>
                  <img src={h.spriteUrl} alt={h.name} className={g?.px?"pixelated":""} onError={e=>handleSpriteErr(e,h)} />
                  <div className="poke-name">{h.name}</div>
                  <div className="poke-game">{h.displayLabel!=null?h.displayLabel:(g?.short||"")}</div>
                  {h.count&&<div className="poke-count">{h.count}</div>}
                </div>
              )})}
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:24}}>
            <button className="btn btn-export" onClick={async()=>{setExp(true);await exportPNG(hunts,title,sub);setExp(false)}} disabled={exp}>
              {exp?"Export en cours…":"⬇ Exporter en PNG"}
            </button>
          </div>
        </>
      ):(
        <div className="empty">
          <div className="icon">✦</div>
          <div style={{fontSize:14}}>Ajoute des Pokémon pour créer ta carte</div>
          <div style={{fontSize:12,color:"#444",marginTop:6}}>Ajout manuel, par génération ou par pokédex régional</div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
